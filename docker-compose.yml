services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./public:/app/public
      - ./data:/app/backend/data
    environment:
      - JWT_SECRET=change_this_secret_in_production
      - NODE_ENV=production
      - DB_FILE=/app/backend/data/data.sqlite
    restart: unless-stopped
